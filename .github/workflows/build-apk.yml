name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  GRADLE_USER_HOME: ~/.gradle
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-licenses: true
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 cmdline-tools;latest'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses
        continue-on-error: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/android/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        shell: bash

      - name: Verify APK exists
        run: ls -la android/app/build/outputs/apk/debug/
        shell: bash

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rainbow-bandage-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
