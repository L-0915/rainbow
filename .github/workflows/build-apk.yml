name: Build Android APK

on:
  push:
    branches:
      - master
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK (Debug)
        run: cd android && ./gradlew assembleDebug
        shell: bash

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainbow-bandage-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build APK (Release - Unsigned)
        run: cd android && ./gradlew assembleRelease
        shell: bash

      - name: Upload Release APK (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: rainbow-bandage-release-unsigned
          path: client/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
